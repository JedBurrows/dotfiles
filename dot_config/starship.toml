add_newline = true
command_timeout = 500
format = "[$directory$git_branch$git_state$git_status]($style)$nodejs$python$cmd_duration$character"

[character]
error_symbol = "[✗](bold cyan)"
success_symbol = "[❯](bold cyan)"

[directory]
truncation_length = 2
truncation_symbol = "…/"
repo_root_style = "bold cyan"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "[$branch]($style) "
style = "italic cyan"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bold yellow"

[git_status]
format     = '[$all_status]($style)'
style      = "cyan"
ahead      = "⇡${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
behind     = "⇣${count} "
conflicted = " "
up_to_date = " "
untracked  = "? "
modified   = " "
stashed    = ""
staged     = ""
renamed    = ""
deleted    = ""

# Contextual: only shown in repos containing the relevant project files.
[nodejs]
format = "[$symbol($version )]($style)"
style = "green"

[python]
symbol = " "
format = '[$symbol$pyenv_prefix($version )(\($virtualenv\) )]($style)'
style = "yellow"

[cmd_duration]
min_time = 2000
format = "[took $duration]($style) "
style = "dimmed white"
